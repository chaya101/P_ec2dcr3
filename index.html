    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;

    body {
      background-color: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;

    .container {

    .badge {

      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.3rem 0.9rem;
      border-radius: 2rem;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #58a6ff, #bc8cff, #ff7b72);
      border-radius: 16px 16px 0 0;
    }

    .project-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #1f6feb, #388bfd);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem auto;
      font-size: 1.8rem;
      box-shadow: 0 4px 20px rgba(56, 139, 253, 0.3);
    }

    .project-name {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #e6edf3;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #e6edf3, #8b949e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #8b949e;
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: #30363d;
      margin: 2rem 0;
    }

    .repo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }

    .repo-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #6e7681;
    }

    .repo-link {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 0.65rem 1.2rem;
      color: #58a6ff;
      font-size: 1.05rem;
      font-weight: 600;
      font-family: 'Courier New', Courier, monospace;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      cursor: default;
    }

    .repo-link:hover {
      background: #2d333b;
      border-color: #58a6ff;
      color: #79c0ff;
    }

    .repo-icon {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .repo-icon svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .stats-row {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 1.5rem;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: #e6edf3;
    }

    .stat-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6e7681;
    }

    footer {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.85rem;
      color: #6e7681;
      letter-spacing: 0.03em;
    }

    footer span {
      color: #bc8cff;

    footer .heart {

    @media (max-width: 480px) {

</head>
